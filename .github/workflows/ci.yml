name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Rust tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Test default features
        run: cargo test

      - name: Test AAC/M4A feature
        run: cargo test --features aac-fdk
